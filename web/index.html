<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Unote: a premium, local-first notebook for students. Block editor, wikilinks, spaced-repetition flashcards, and AI-assisted capture." />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='84'%3E%F0%9F%93%93%3C/text%3E%3C/svg%3E"
    />
    <title>Unote</title>
    <script>
      // Theme bootstrap — runs before first paint to avoid a light/dark FOUC.
      // Mirrors src/lib/theme.ts (kept inline: it must run before any module loads).
      (function () {
        try {
          var saved = localStorage.getItem('folio:theme');
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
